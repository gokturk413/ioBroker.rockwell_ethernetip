name: Test and Release

# Run this job on all pushes and pull requests
# as well as tags with a semantic version
on:
  push:
    branches:
      - "main"
    tags:
      # normal versions
      - "v[0-9]+.[0-9]+.[0-9]+"
      # pre-releases
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request: {}

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Performs quick checks before the expensive test runs
  check-and-lint:
    if: contains(github.event.head_commit.message, '[skip ci]') == false

    runs-on: ubuntu-latest

    steps:
      - uses: ioBroker/testing-action-check@v2
        with:
          node-version: '24.x'
          # Uncomment the following line if your adapter cannot be installed using 'npm ci'
          # install-command: 'npm install'
          lint: true

  # Runs adapter tests on all supported node versions and OSes
  adapter-tests:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    needs: [check-and-lint]

    runs-on: ${{ matrix.os }}
    strategy:
      # One OS failing should not hide the result of the others.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22.x, 24.x]

    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}
          # Uncomment the following line if your adapter cannot be installed using 'npm ci'
          # install-command: 'npm install'
          build: true

  # Publishes the adapter to npm with provenance. The native engine binaries are
  # built in the private engine repo and attached to its GitHub release; this job
  # pulls them in before publishing so the npm package ships every platform.
  #
  # Gated OFF by default (vars.ENABLE_DEPLOY != 'true') so it never runs — and never
  # spends CI — until trusted publishing is set up. To enable automated releases:
  #   1. npm: configure trusted publishing for iobroker.rockwell-enip → repo
  #      gokturk413/ioBroker.rockwell-enip, workflow test-and-release.yml.
  #   2. GitHub: add secret ENGINE_ASSETS_TOKEN (PAT with read access to the private
  #      engine repo's releases) and set repository variable ENABLE_DEPLOY = true.
  # Then tag the public repo (vX.Y.Z) after the engine repo has published its release
  # assets for the same version.
  deploy:
    needs: [check-and-lint, adapter-tests]
    if: |
      vars.ENABLE_DEPLOY == 'true' &&
      github.repository == 'gokturk413/ioBroker.rockwell-enip' &&
      contains(github.event.head_commit.message, '[skip ci]') == false &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    permissions:
      id-token: write # OIDC → npm provenance / trusted publishing
      contents: write # create the GitHub release

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Check tag matches package version
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          [ "$pkg" = "$tag" ] || { echo "package.json is $pkg but the tag is $tag"; exit 1; }

      # A custom publish (not ioBroker/testing-action-deploy@v1) is required because
      # the native engine binaries live in a separate private repo and must be pulled
      # in before packing — the standard action cannot do that.
      - name: Pull engine binaries from the engine repo's latest release
        env:
          GH_TOKEN: ${{ secrets.ENGINE_ASSETS_TOKEN }}
        run: |
          # Reuse the engine repo's latest published binaries, so a JS/admin-only
          # release needs no native rebuild. Add a "v<x.y.z>" tag argument to
          # gh release download to pin a specific engine build instead.
          for rid in win-x64 linux-x64 linux-arm64 osx-arm64 osx-x64; do
            mkdir -p "prebuilds/$rid"
            gh release download --repo gokturk413/rockwell_ethernetip-engine \
              --pattern "rockwell_engine-$rid.node" --output "prebuilds/$rid/rockwell_engine.node"
            gzip -9 -f "prebuilds/$rid/rockwell_engine.node"
          done
          ls -lR prebuilds

      - run: npm ci
      - run: npm run build
      - run: npm run test:package

      - name: Publish to npm with provenance
        run: |
          npm install -g npm@latest
          npm publish --provenance --access public

      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
